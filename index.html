<script>
const ICONS = ['sunny','fitness_center','menu_book','ac_unit','directions_run','self_improvement','water_drop','bedtime','local_dining','psychology','favorite','music_note','code','brush','hiking','spa'];

function buildIconPicker(pickerId, inputId, onSelect) {
  const el = document.getElementById(pickerId);
  if (!el) return;
  el.innerHTML = ICONS.map(ic =>
    `<div class="icon-option" data-icon="${ic}" onclick="${onSelect}('${ic}')"><span class="material-symbols-outlined text-xl">${ic}</span></div>`
  ).join('');
}

initApp('dashboard');
buildIconPicker('icon-picker', 'habit-icon-input', 'selectIcon');
selectIcon('sunny');
buildDayPicker('day-picker-add', 'habit-days-input');

const store = window._store;
let chartMode = 'daily';

/* ---- Weekly progress: completed / total scheduled this week ---- */
function getWeekProgress() {
  const ws = getWeekStart(new Date());
  const today = dateStr(new Date());
  let done = 0, total = 0;
  store.activeHabits().forEach(h => {
    const sched = h.days ?? [0,1,2,3,4,5,6];
    for (let i = 0; i < 7; i++) {
      const d = new Date(ws); d.setDate(ws.getDate() + i);
      const ds = dateStr(d);
      if (store.isException(ds)) continue;
      if (h.createdAt > ds) continue;
      if (!sched.includes(d.getDay())) continue;
      total++;
      if (h.completions[ds]) done++;
    }
  });
  return { done, total };
}

/* ---- Daily completion rate (today's habits) ---- */
function getTodayRate() {
  const today = dateStr(new Date());
  if (store.isException(today)) return null;
  const dow = dayOfWeek(new Date());
  const scheduled = store.activeHabits().filter(h => {
    const sched = h.days ?? [0,1,2,3,4,5,6];
    return sched.includes(dow) && h.createdAt <= today;
  });
  if (!scheduled.length) return 0;
  return Math.round(scheduled.filter(h => h.completions[today]).length / scheduled.length * 100);
}

/* ---- Chart helpers ---- */
function setChartMode(mode) {
  chartMode = mode;
  document.querySelectorAll('.chart-tab').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.mode === mode));
  renderChart();
}

function cellColor(r) {
  if (r === null) return { bg: 'rgba(255,255,255,0.04)', border: 'rgba(255,255,255,0.07)', text: 'rgba(255,255,255,0.15)' };
  const daily = chartMode === 'daily';
  const green  = daily ? r === 100 : r > 80;
  const yellow = daily ? (r > 50 && r < 100) : (r >= 50 && r <= 80);
  if (green)  return { bg: 'rgba(75,226,119,0.18)',  border: 'rgba(75,226,119,0.5)',  text: '#4be277' };
  if (yellow) return { bg: 'rgba(240,192,64,0.18)',  border: 'rgba(240,192,64,0.5)',  text: '#f0c040' };
               return { bg: 'rgba(224,92,92,0.18)',   border: 'rgba(224,92,92,0.5)',   text: '#e05c5c' };
}

function getDayRate(ds, dow) {
  if (store.isException(ds)) return null;
  const onDay = store.activeHabits().filter(h => {
    const s = h.days ?? [0,1,2,3,4,5,6];
    return s.includes(dow) && h.createdAt <= ds;
  });
  if (!onDay.length) return null;
  return Math.round(onDay.filter(h => h.completions[ds]).length / onDay.length * 100);
}

function getWeekRate(wStart, todayStr) {
  let total = 0, count = 0;
  for (let di = 0; di < 7; di++) {
    const d = new Date(wStart); d.setDate(wStart.getDate() + di);
    const ds = dateStr(d);
    if (ds > todayStr) continue;
    if (store.isException(ds)) continue;
    const onDay = store.activeHabits().filter(h => {
      const s = h.days ?? [0,1,2,3,4,5,6];
      return s.includes(d.getDay()) && h.createdAt <= ds;
    });
    if (!onDay.length) continue;
    total += onDay.filter(h => h.completions[ds]).length / onDay.length * 100;
    count++;
  }
  return count > 0 ? Math.round(total / count) : null;
}

function getMonthRate(yr, mn, todayStr) {
  const days = new Date(yr, mn + 1, 0).getDate();
  let total = 0, count = 0;
  for (let day = 1; day <= days; day++) {
    const d = new Date(yr, mn, day), ds = dateStr(d);
    if (ds > todayStr) continue;
    if (store.isException(ds)) continue;
    const onDay = store.activeHabits().filter(h => {
      const s = h.days ?? [0,1,2,3,4,5,6];
      return s.includes(d.getDay()) && h.createdAt <= ds;
    });
    if (!onDay.length) continue;
    total += onDay.filter(h => h.completions[ds]).length / onDay.length * 100;
    count++;
  }
  return count > 0 ? Math.round(total / count) : null;
}

function drawHeatmap(colHeaders, rowHeaders, grid, tooltips) {
  const container = document.getElementById('chart-bars');
  const isMobile = document.body.classList.contains('mobile-mode');
  const W = container.clientWidth || 400;
  const H = container.clientHeight || 300;
  const nCols = colHeaders.length, nRows = rowHeaders.length;
  const LABEL_W = isMobile ? 72 : 88, GAP = 5, HEADER_H = 22;

  const cellW = isMobile ? 30 : Math.max(Math.floor((W - LABEL_W - (nCols - 1) * GAP) / nCols), 18);
  const cellH = isMobile ? 28 : Math.max(Math.floor((H - HEADER_H - (nRows - 1) * GAP) / nRows), 18);
  const fsVal = cellH >= 46 ? '0.68rem' : cellH >= 32 ? '0.6rem' : '0.52rem';

  const colRow = `<div style="display:flex;gap:${GAP}px;padding-left:${LABEL_W}px;height:${HEADER_H}px;align-items:flex-end;padding-bottom:3px">
    ${colHeaders.map(h => `<div style="width:${cellW}px;flex-shrink:0;text-align:center;font-size:0.52rem;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.05em">${h}</div>`).join('')}
  </div>`;

  const rows = rowHeaders.map((rh, ri) =>
    `<div style="display:flex;align-items:center;gap:${GAP}px">
      <div style="width:${LABEL_W}px;flex-shrink:0;text-align:right;padding-right:7px;font-size:0.5rem;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.02em;white-space:nowrap;overflow:hidden">${rh}</div>
      ${grid[ri].map((r, ci) => {
        const { bg, border, text } = cellColor(r);
        const tt = tooltips?.[ri]?.[ci] || '';
        return `<div title="${tt}" style="width:${cellW}px;height:${cellH}px;flex-shrink:0;background:${bg};border:1px solid ${border};
          border-radius:6px;display:flex;align-items:center;justify-content:center;
          font-size:${fsVal};font-weight:700;color:${text};cursor:default;transition:transform 0.13s;box-sizing:border-box"
          onmouseover="this.style.transform='scale(1.12)';this.style.zIndex='10'"
          onmouseout="this.style.transform='scale(1)';this.style.zIndex=''">${r !== null ? r + '%' : ''}</div>`;
      }).join('')}
    </div>`
  ).join('');

  container.innerHTML = `<div style="display:flex;flex-direction:column;gap:${GAP}px;${isMobile ? 'min-width:fit-content' : 'height:100%'}">${colRow}${rows}</div>`;
  document.getElementById('chart-labels').innerHTML = '';
}

function renderChart() {
  if (store.activeHabits().length === 0) {
    document.getElementById('chart-bars').innerHTML =
      `<div style="height:100%;display:flex;align-items:center;justify-content:center">
         <span style="font-size:0.85rem;font-weight:600;color:rgba(188,203,185,0.4);letter-spacing:0.04em">Add your first habit to start tracking</span>
       </div>`;
    document.getElementById('chart-labels').innerHTML = '';
    return;
  }
  const today = new Date(), todayStr = dateStr(today);
  const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  if (chartMode === 'daily') {
    const NUM_WEEKS = 5;
    const ws = getWeekStart(today);
    const rowHeaders = [], grid = [], tooltips = [];
    for (let w = 0; w < NUM_WEEKS; w++) {
      // w=0 = current week (top row)
      const sun = new Date(ws); sun.setDate(ws.getDate() - w * 7);
      const sat = new Date(sun); sat.setDate(sun.getDate() + 6);
      const startFmt = sun.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const endFmt = sun.getMonth() === sat.getMonth()
        ? `–${sat.getDate()}`
        : `–${sat.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
      rowHeaders.push(startFmt + endFmt);
      const row = [], ttRow = [];
      for (let d = 0; d < 7; d++) {
        const day = new Date(sun); day.setDate(sun.getDate() + d);
        const ds = dateStr(day);
        if (ds > todayStr) { row.push(null); ttRow.push(''); continue; }
        const r = getDayRate(ds, day.getDay());
        row.push(r);
        ttRow.push(day.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + (r !== null ? ' · ' + r + '%' : ''));
      }
      grid.push(row); tooltips.push(ttRow);
    }
    drawHeatmap(DAY_NAMES, rowHeaders, grid, tooltips);

  } else if (chartMode === 'weekly') {
    const NUM_MONTHS = 5;
    const rowHeaders = [], grid = [], tooltips = [];
    for (let m = 0; m < NUM_MONTHS; m++) {
      const mo = new Date(today.getFullYear(), today.getMonth() - m, 1);
      const yr = mo.getFullYear(), mn = mo.getMonth();
      rowHeaders.push(MO[mn] + (yr !== today.getFullYear() ? ' \'' + String(yr).slice(2) : ''));
      const lastDay = new Date(yr, mn + 1, 0);
      const monthWeeks = [];
      let cur = new Date(getWeekStart(mo));
      while (cur <= lastDay && monthWeeks.length < 5) {
        monthWeeks.push(new Date(cur));
        cur = new Date(cur); cur.setDate(cur.getDate() + 7);
      }
      const row = [], ttRow = [];
      for (let wi = 0; wi < 5; wi++) {
        if (wi >= monthWeeks.length || dateStr(monthWeeks[wi]) > todayStr) { row.push(null); ttRow.push(''); continue; }
        const wStart = monthWeeks[wi];
        const wEnd = new Date(wStart); wEnd.setDate(wStart.getDate() + 6);
        const r = getWeekRate(wStart, todayStr);
        const s = wStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const e = wEnd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        row.push(r); ttRow.push(`${s}–${e}${r !== null ? ' · ' + r + '%' : ''}`);
      }
      grid.push(row); tooltips.push(ttRow);
    }
    drawHeatmap(['W1','W2','W3','W4','W5'], rowHeaders, grid, tooltips);

  } else {
    const firstStr = store.getFirstHabitDate();
    const firstYear = firstStr ? parseInt(firstStr.slice(0, 4)) : today.getFullYear();
    const rowHeaders = [], grid = [], tooltips = [];
    for (let yr = firstYear; yr <= today.getFullYear(); yr++) {
      rowHeaders.push(String(yr));
      const row = [], ttRow = [];
      for (let mn = 0; mn < 12; mn++) {
        const moStr = `${yr}-${String(mn+1).padStart(2,'0')}-01`;
        const lastOfMonth = `${yr}-${String(mn+1).padStart(2,'0')}-${String(new Date(yr, mn+1, 0).getDate()).padStart(2,'0')}`;
        if (moStr > todayStr || (firstStr && lastOfMonth < firstStr)) { row.push(null); ttRow.push(''); continue; }
        const r = getMonthRate(yr, mn, todayStr);
        row.push(r); ttRow.push(MO[mn] + ' ' + yr + (r !== null ? ' · ' + r + '%' : ''));
      }
      grid.push(row); tooltips.push(ttRow);
    }
    drawHeatmap(MO, rowHeaders, grid, tooltips);
  }
}

/* ---- Main render ---- */
function renderDashboard() {
  const today = dateStr(new Date());
  const hasHabits = store.activeHabits().length > 0;

  // Daily completion
  const pct = hasHabits ? getTodayRate() : 0;
  if (pct === null) {
    document.getElementById('daily-pct').textContent = '–';
    document.getElementById('daily-bar').style.width = '0%';
    document.getElementById('daily-delta').textContent = 'Day off';
  } else {
    document.getElementById('daily-pct').textContent = pct;
    setTimeout(() => { document.getElementById('daily-bar').style.width = pct + '%'; }, 100);
    document.getElementById('daily-delta').textContent =
      pct >= 100 ? 'All done today!' : pct >= 50 ? 'Keep pushing!' : pct > 0 ? "Let's go!" : '';
  }

  // Weekly progress
  const { done: wDone, total: wTotal } = hasHabits ? getWeekProgress() : { done: 0, total: 0 };
  document.getElementById('week-done').textContent = wDone;
  document.getElementById('week-total').textContent = wTotal;
  const wPct = wTotal > 0 ? Math.round(wDone / wTotal * 100) : 0;
  setTimeout(() => { document.getElementById('week-bar').style.width = wPct + '%'; }, 100);
  document.getElementById('week-delta').textContent =
    wTotal === 0 ? '' : wDone === wTotal ? 'Perfect week!' : `${wTotal - wDone} remaining`;

  // Chart
  renderChart();

  // Today's Habits
  const protocols = document.getElementById('protocols-list');
  const active = store.activeHabits();
  const dow = dayOfWeek(new Date());
  const todayHabits = active.filter(h => { const s = h.days ?? [0,1,2,3,4,5,6]; return s.includes(dow); });
  if (!todayHabits.length) {
    protocols.innerHTML = `<p class="text-on-surface-variant text-sm text-center py-8">No habits scheduled today.</p>`;
  } else {
    const colors = ['primary', 'secondary', 'tertiary'];
    const colorHex = { primary: '#4be277', secondary: '#4cd7f6', tertiary: '#deb8ff' };
    protocols.innerHTML = todayHabits.slice(0, 6).map((h, i) => {
      const done = h.completions[today];
      const streak = store.getStreak(h.id);
      const col = colors[i % colors.length];
      const hex = colorHex[col];
      return `<div class="rounded-lg p-3 border-l-4 cursor-pointer hover:bg-white/5 transition-all select-none"
                   style="background:#171f33;border-left-color:${hex}"
                   onclick="toggleTodayHabit('${h.id}')">
        <div class="flex justify-between items-start mb-1.5">
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-base" style="color:${hex}">${h.icon}</span>
            <span class="text-sm font-bold text-on-surface">${h.name}</span>
          </div>
          <span class="text-xs font-bold" style="color:${hex}">${done ? '✓ Done' : 'Tap to mark'}</span>
        </div>
        <div class="w-full h-1 rounded-full" style="background:#2d3449">
          <div class="h-full rounded-full transition-all duration-300" style="width:${done ? 100 : 0}%;background:${hex}"></div>
        </div>
        ${streak > 0 ? `<div class="mt-1.5"><span class="text-xs px-1.5 py-0.5 rounded font-bold" style="background:rgba(75,226,119,0.1);color:#4be277">${streak}d streak</span></div>` : ''}
      </div>`;
    }).join('');
  }
}

function toggleTodayHabit(habitId) {
  store.toggleCompletion(habitId, dateStr(new Date()));
  renderDashboard();
}

function selectIcon(ic) {
  document.querySelectorAll('.icon-option').forEach(el => el.classList.remove('selected'));
  document.querySelector(`[data-icon="${ic}"]`)?.classList.add('selected');
  document.getElementById('habit-icon-input').value = ic;
}

function submitNewHabit(e) {
  e.preventDefault();
  const name = document.getElementById('habit-name-input').value.trim();
  const icon = document.getElementById('habit-icon-input').value;
  const days = getDayPickerValue('habit-days-input');
  if (!name) return;
  store.addHabit(name, icon, days);
  closeModal('add-habit-modal');
  e.target.reset();
  buildDayPicker('day-picker-add', 'habit-days-input');
  selectIcon('sunny');
  renderDashboard();
  showToast('Habit added!', 'check_circle');
}

renderDashboard();
</script>
</body>
</html>
