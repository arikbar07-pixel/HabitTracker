<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Habits — Tasks</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#4be277"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="My Habits"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="styles.css" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: { extend: {
    colors: {
      "primary": "#4be277", "primary-container": "#22c55e", "on-primary": "#003915", "error": "#ffb4ab",
      "secondary": "#4cd7f6", "tertiary": "#deb8ff",
      "surface": "#0b1326", "surface-container": "#171f33",
      "surface-container-low": "#131b2e", "surface-container-lowest": "#060e20",
      "surface-container-high": "#222a3d", "surface-container-highest": "#2d3449",
      "on-surface": "#dae2fd", "on-surface-variant": "#bccbb9",
      "outline": "#869585", "outline-variant": "#3d4a3d", "background": "#0b1326",
    }
  }}
}
</script>
<style>
.task-row { transition: all 0.2s ease; }
.task-row.done .task-name { text-decoration: line-through; opacity: 0.45; }
.task-checkbox {
  width: 20px; height: 20px;
  border: 2px solid #2d3449;
  border-radius: 5px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.task-checkbox:hover { border-color: #4be277; }
.task-checkbox.checked { background: #4be277; border-color: #4be277; }
.filter-tab { transition: all 0.15s; cursor: pointer; }
.filter-tab.active { background: #4be277; color: #003915; }
.date-group-header {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: #bccbb9;
  padding: 0.75rem 0 0.4rem;
  border-bottom: 1px solid #1e293b;
  margin-bottom: 0.25rem;
}
.date-group-header.overdue { color: #ffb4ab; }
.date-group-header.today { color: #4be277; }
.time-clock-input {
  font-family: 'Courier New', monospace !important;
  font-size: 1.25rem !important;
  font-weight: 900 !important;
  text-align: center !important;
  letter-spacing: 0.15em !important;
  background: #131b2e !important;
  border: 1px solid #2d3449 !important;
  border-radius: 0.5rem;
  padding: 0.5rem 0.875rem !important;
  width: 100%;
  outline: none;
  transition: color 0.2s, border-color 0.2s, text-shadow 0.2s;
  color: #2d3449 !important;
  -webkit-text-fill-color: #2d3449 !important;
}
.time-clock-input::placeholder {
  color: #2d3449 !important;
  -webkit-text-fill-color: #2d3449 !important;
  opacity: 1;
}
.time-clock-input:focus { border-color: rgba(75,226,119,0.4) !important; }
.time-clock-input.active {
  color: #4be277 !important;
  -webkit-text-fill-color: #4be277 !important;
  border-color: rgba(75,226,119,0.4) !important;
  text-shadow: 0 0 10px rgba(75,226,119,0.5);
}
</style>
</head>
<body class="bg-background text-on-surface min-h-screen">

<div id="header-mount"></div>

<div class="flex">
  <div id="sidebar-mount"></div>

  <main class="flex-1 md:ml-64 p-5 md:p-12 pb-24 md:pb-12 fade-in">

    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
      <div>
        <h1 class="text-3xl font-black text-on-surface" style="font-family:Montserrat">Tasks</h1>
        <p class="text-on-surface-variant text-sm mt-1" id="tasks-subtitle">Your to-do list</p>
      </div>
      <button onclick="openAddTask()" class="bg-primary text-on-primary py-2.5 px-5 rounded-lg font-bold flex items-center gap-2 hover:brightness-110 transition-all text-sm shadow-lg">
        <span class="material-symbols-outlined text-xl">add</span>New Task
      </button>
    </div>

    <!-- Filter tabs -->
    <div class="flex gap-2 mb-6 flex-wrap">
      <button class="filter-tab active px-4 py-1.5 rounded-full text-xs font-bold border border-outline-variant/30" data-filter="all" onclick="setFilter('all')">All</button>
      <button class="filter-tab px-4 py-1.5 rounded-full text-xs font-bold border border-outline-variant/30 text-on-surface-variant" data-filter="today" onclick="setFilter('today')">Today</button>
      <button class="filter-tab px-4 py-1.5 rounded-full text-xs font-bold border border-outline-variant/30 text-on-surface-variant" data-filter="upcoming" onclick="setFilter('upcoming')">Upcoming</button>
      <button class="filter-tab px-4 py-1.5 rounded-full text-xs font-bold border border-outline-variant/30 text-on-surface-variant" data-filter="done" onclick="setFilter('done')">Done</button>
    </div>

    <!-- Task list -->
    <div id="task-list" class="max-w-2xl"></div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-20 max-w-2xl">
      <span class="material-symbols-outlined text-5xl text-on-surface-variant mb-3 block">checklist</span>
      <h3 class="font-bold text-on-surface mb-2">No tasks here</h3>
      <p class="text-on-surface-variant text-sm mb-6">Add a task to get started.</p>
      <button onclick="openAddTask()" class="bg-primary text-on-primary py-2.5 px-6 rounded-lg font-bold text-sm hover:brightness-110">Add First Task</button>
    </div>

  </main>
</div>

<!-- Add / Edit Task Modal -->
<div class="modal-overlay" id="task-modal" onclick="if(event.target===this)closeModal('task-modal')">
  <div class="modal-box" style="max-width:460px">
    <div class="flex justify-between items-center mb-5">
      <h3 class="font-bold text-lg text-on-surface" id="task-modal-title" style="font-family:Montserrat">New Task</h3>
      <button onclick="closeModal('task-modal')" class="text-on-surface-variant hover:text-primary transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <form onsubmit="submitTask(event)">
      <input type="hidden" id="task-edit-id"/>
      <div class="mb-4">
        <label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 block">Task *</label>
        <input class="habit-input" type="text" id="task-name-input" placeholder="What do you need to do?" required/>
      </div>
      <div class="grid grid-cols-2 gap-3 mb-4" style="align-items:start">
        <div>
          <label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 block">Date</label>
          <input class="habit-input" type="date" id="task-date-input"/>
        </div>
        <div>
          <label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 block">Time</label>
          <input type="text" id="task-time-input" class="time-clock-input" placeholder="--:--" maxlength="5" oninput="syncTimeStyle(this)" onblur="formatTimeInput(this)"/>
        </div>
      </div>
      <div class="mb-6">
        <label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 block">Notes</label>
        <input class="habit-input" type="text" id="task-notes-input" placeholder="Optional details..."/>
      </div>
      <div class="flex gap-3">
        <button type="button" id="task-delete-btn" class="hidden flex-1 py-2.5 rounded-lg border text-sm font-bold hover:bg-error/10 transition-all" style="border-color:rgba(255,180,171,0.3);color:#ffb4ab" onclick="deleteTaskFromModal()">Delete</button>
        <button type="button" onclick="closeModal('task-modal')" class="flex-1 py-2.5 rounded-lg border border-outline-variant/40 text-on-surface-variant text-sm font-bold hover:bg-white/5">Cancel</button>
        <button type="submit" class="flex-1 py-2.5 rounded-lg bg-primary text-on-primary text-sm font-bold hover:brightness-110">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- FAB -->
<button onclick="openAddTask()" class="fixed bottom-20 right-6 md:bottom-10 md:right-10 w-14 h-14 bg-primary text-on-primary rounded-full flex items-center justify-center shadow-[0_8px_24px_rgba(75,226,119,0.4)] hover:scale-110 active:scale-95 transition-all z-40 group">
  <span class="material-symbols-outlined text-3xl group-hover:rotate-90 transition-transform">add</span>
</button>

<div id="mobile-nav-mount"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="app.js"></script>
<script>
initApp('tasks');
const store = window._store;
let currentFilter = 'all';

/* ---- Time helpers ---- */
function syncTimeStyle(el) {
  el.classList.toggle('active', el.value.trim().length > 0);
}

function formatTimeInput(el) {
  const digits = el.value.replace(/\D/g, '');
  if (digits.length === 3) {
    el.value = digits[0] + ':' + digits.slice(1);
  } else if (digits.length === 4) {
    el.value = digits.slice(0, 2) + ':' + digits.slice(2);
  }
  syncTimeStyle(el);
}

function getTaskTime() {
  return document.getElementById('task-time-input').value.trim();
}

function setTaskTime(t) {
  const el = document.getElementById('task-time-input');
  el.value = t || '';
  syncTimeStyle(el);
}

/* ---- helpers ---- */
function todayStr() { return dateStr(new Date()); }

function friendlyDate(ds) {
  const today = todayStr();
  const tomorrow = dateStr(new Date(Date.now() + 86400000));
  if (ds === today) return 'Today';
  if (ds === tomorrow) return 'Tomorrow';
  const d = new Date(ds + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function friendlyTime(t) {
  return t || '';
}

/* ---- filter ---- */
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(btn => {
    const isActive = btn.dataset.filter === f;
    btn.classList.toggle('active', isActive);
    btn.style.color = isActive ? '#003915' : '';
  });
  renderTasks();
}

/* ---- render ---- */
function renderTasks() {
  const tasks = store.data.tasks || [];
  const today = todayStr();

  let filtered = tasks;
  if (currentFilter === 'today') filtered = tasks.filter(t => t.date === today && !t.done);
  else if (currentFilter === 'upcoming') filtered = tasks.filter(t => t.date > today && !t.done);
  else if (currentFilter === 'done') filtered = tasks.filter(t => t.done);
  else filtered = tasks; // all

  const pending = filtered.filter(t => !t.done).sort((a, b) => {
    if (a.date !== b.date) return a.date < b.date ? -1 : 1;
    if (a.time && b.time) return a.time < b.time ? -1 : 1;
    return 0;
  });
  const done = filtered.filter(t => t.done).sort((a, b) => b.createdAt > a.createdAt ? 1 : -1);

  const list = document.getElementById('task-list');
  const empty = document.getElementById('empty-state');

  // subtitle counts
  const totalPending = tasks.filter(t => !t.done).length;
  const todayCount = tasks.filter(t => t.date === today && !t.done).length;
  document.getElementById('tasks-subtitle').textContent =
    totalPending === 0 ? 'All caught up!' :
    `${totalPending} pending • ${todayCount} for today`;

  if (!filtered.length) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  // Group pending by date
  const groups = {};
  pending.forEach(t => {
    const key = t.date || 'no-date';
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });

  let html = '';

  Object.keys(groups).sort().forEach(dateKey => {
    const isOverdue = dateKey < today;
    const isToday = dateKey === today;
    const label = dateKey === 'no-date' ? 'No date' : friendlyDate(dateKey);
    const headerClass = isOverdue ? 'overdue' : isToday ? 'today' : '';
    html += `<div class="date-group-header ${headerClass}">${isOverdue ? '⚠ Overdue — ' : ''}${label}</div>`;
    groups[dateKey].forEach(t => { html += renderTaskRow(t, false); });
  });

  // Done tasks
  if (done.length && currentFilter !== 'upcoming') {
    html += `<div class="date-group-header mt-4">Done (${done.length})</div>`;
    done.forEach(t => { html += renderTaskRow(t, true); });
  }

  list.innerHTML = html;
}

function renderTaskRow(t, isDone) {
  const timeStr = t.time ? `<span class="text-[11px] font-bold px-1.5 py-0.5 rounded" style="background:#131b2e;color:#4cd7f6">${friendlyTime(t.time)}</span>` : '';
  const notes = t.notes ? `<div class="text-xs text-on-surface-variant mt-0.5 ml-7">${t.notes}</div>` : '';
  return `
  <div class="task-row flex items-start gap-3 py-3 px-1 border-b group ${isDone ? 'done' : ''}" style="border-color:#1a2238">
    <div class="task-checkbox mt-0.5 ${isDone ? 'checked' : ''}" onclick="toggleTask('${t.id}')">
      ${isDone ? '<span class="material-symbols-outlined text-on-primary" style="font-size:13px;font-variation-settings:\'FILL\' 1">check</span>' : ''}
    </div>
    <div class="flex-1 min-w-0 cursor-pointer" onclick="openEditTask('${t.id}')">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="task-name text-sm font-semibold text-on-surface">${t.name}</span>
        ${timeStr}
      </div>
      ${notes}
    </div>
    <button onclick="store.deleteTask('${t.id}');renderTasks()" class="opacity-0 group-hover:opacity-100 transition-opacity text-on-surface-variant hover:text-error mt-0.5">
      <span class="material-symbols-outlined text-lg">delete</span>
    </button>
  </div>`;
}

function toggleTask(id) {
  store.toggleTask(id);
  renderTasks();
}

/* ---- add / edit modal ---- */
function openAddTask() {
  document.getElementById('task-modal-title').textContent = 'New Task';
  document.getElementById('task-edit-id').value = '';
  document.getElementById('task-name-input').value = '';
  document.getElementById('task-date-input').value = todayStr();
  document.getElementById('task-notes-input').value = '';
  document.getElementById('task-delete-btn').classList.add('hidden');
  setTaskTime('');
  openModal('task-modal');
}

function openEditTask(id) {
  const t = (store.data.tasks || []).find(t => t.id === id);
  if (!t) return;
  document.getElementById('task-modal-title').textContent = 'Edit Task';
  document.getElementById('task-edit-id').value = id;
  document.getElementById('task-name-input').value = t.name;
  document.getElementById('task-date-input').value = t.date || '';
  setTaskTime(t.time || '');
  document.getElementById('task-notes-input').value = t.notes || '';
  document.getElementById('task-delete-btn').classList.remove('hidden');
  openModal('task-modal');
}

function submitTask(e) {
  e.preventDefault();
  const id = document.getElementById('task-edit-id').value;
  const name = document.getElementById('task-name-input').value.trim();
  const date = document.getElementById('task-date-input').value;
  const time = getTaskTime();
  const notes = document.getElementById('task-notes-input').value.trim();
  if (!name) return;
  if (id) {
    store.updateTask(id, { name, date, time, notes });
    showToast('Task updated', 'edit');
  } else {
    store.addTask(name, date, time, notes);
    showToast('Task added!', 'check_circle');
  }
  closeModal('task-modal');
  renderTasks();
}

function deleteTaskFromModal() {
  const id = document.getElementById('task-edit-id').value;
  if (id && confirm('Delete this task?')) {
    store.deleteTask(id);
    closeModal('task-modal');
    renderTasks();
    showToast('Task deleted', 'delete');
  }
}

renderTasks();
</script>
</body>
</html>
